defaults:
  timeout_seconds: 20
  max_results_per_query: 100
sources:
  - name: greenhouse
    type: ats
    enabled: true
    reliability_tier: tier1
    base_url: https://boards.greenhouse.io/
    params:
      board_tokens: 
        - stripe
  - name: lever
    type: ats
    enabled: false
    reliability_tier: tier1
    base_url: https://jobs.lever.co/
    params:
      account_names: []
  - name: ashby
    type: ats
    enabled: false
    reliability_tier: tier1
    base_url: https://jobs.ashbyhq.com/
    params:
      job_board_names: []
  - name: linkedin
    type: aggregator
    enabled: false
    reliability_tier: tier2
    base_url: https://www.linkedin.com/jobs/
discovery_sources:
  # SerpAPI Google Jobs - requires SERPAPI_KEY in .env.
  - name: company_search
    type: search
    enabled: true
    params:
      results: []
      results_urls: []
      query_url_template: "https://serpapi.com/search.json?engine=google_jobs&q={query}&location={location}&api_key=$SERPAPI_KEY"
      results_payload_key: jobs_results
      field_map:
        title: job_title
        location: location_text

  # RemoteOK public feed - no API key required. Fetches all remote tech jobs and
  # filters client-side by configured keywords. All entries are workplace_type=remote.
  - name: remote_ok
    type: aggregator
    enabled: true
    params:
      feed_url: "https://remoteok.com/api"

  # Hacker News "Who is hiring?" monthly thread - no API key required. Auto-detects
  # the current month's thread via HN Algolia. Pin a specific thread with story_id.
  - name: hn_whos_hiring
    type: aggregator
    enabled: true
    params: {}
instant_search_sources:
  # Brave Search web API - requires BRAVE_SEARCH_API_KEY in .env.
  - name: brave_search
    type: search
    enabled: true
    base_url: https://api.search.brave.com/res/v1/web/search
    api_key_env: BRAVE_SEARCH_API_KEY
    params:
      count: 20
      country: US
      search_lang: en
      safesearch: moderate
