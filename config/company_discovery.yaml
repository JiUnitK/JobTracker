defaults:
  max_results_per_query: 50
  resolution_confidence: 0.7
scoring:
  fit_weights:
    title_match: 0.4
    skill_match: 0.25
    location_match: 0.35
    repeated_appearance: 0.0
    ats_confidence: 0.0
    fresh_evidence: 0.0
  hiring_weights:
    title_match: 0.0
    skill_match: 0.0
    location_match: 0.0
    repeated_appearance: 0.35
    ats_confidence: 0.35
    fresh_evidence: 0.3
  priority_mix:
    fit_score: 0.5
    hiring_score: 0.5
queries:
  - keywords:
      - software engineer
      - backend engineer
    locations:
      - Austin, TX
      - Remote
    workplace_types:
      - remote
      - hybrid
sources:
  # Requires a search API (e.g. SerpAPI). Populate query_url_template when available.
  - name: company_search
    type: search
    enabled: false
    params:
      results: []
      results_urls: []
      query_url_template: ""
      results_payload_key: results

  # RemoteOK public feed — no API key required. Fetches all remote tech jobs and
  # filters client-side by configured keywords. All entries are workplace_type=remote.
  - name: remote_ok
    type: aggregator
    enabled: true
    params:
      feed_url: "https://remoteok.com/api"

  # Hacker News "Who is hiring?" monthly thread — no API key required. Auto-detects
  # the current month's thread via HN Algolia. Pin a specific thread with story_id.
  - name: hn_whos_hiring
    type: aggregator
    enabled: true
    params: {}

  # Austin-based and Austin-presence tech companies. Update careers_url to ATS board
  # URLs (boards.greenhouse.io/..., jobs.lever.co/...) as you verify each company.
  - name: austin_ecosystem
    type: ecosystem
    enabled: true
    params:
      entries: []
      entries_urls:
        - file:///F:/Projects/JobTracker/config/data/austin_ecosystem.json
      entries_payload_key: entries

  # Broader curated list of remote/hybrid-friendly tech companies. Same note on
  # careers_url: swap general /careers pages for specific ATS board URLs where known.
  - name: company_directory
    type: directory
    enabled: true
    params:
      entries: []
      entries_urls:
        - file:///F:/Projects/JobTracker/config/data/company_directory.json
      entries_payload_key: entries
