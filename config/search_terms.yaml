include:
  - software engineer
  - backend engineer
  - platform engineer
  - python
  - distributed systems
exclude:
  - internship
  - contractor
locations:
  - Austin, TX
  - Remote
  - United States
workplace_types:
  - remote
  - hybrid
  - onsite
seniority:
  - mid
  - senior
instant_job_search:
  max_age_days: 7
  include_unknown_age: false
  queries: []
  query_templates:
    - '"{query}" "{location}" {workplace_terms} {job_intent}'
    - '"{query}" "{location}" careers recently posted {workplace_terms}'
    - 'site:greenhouse.io "{query}" "{location}" {workplace_terms}'
    - 'site:jobs.lever.co "{query}" "{location}" {workplace_terms}'
    - 'site:jobs.ashbyhq.com "{query}" "{location}" {workplace_terms}'
discovery_queries:
  - keywords:
      - software engineer
      - backend engineer
    locations:
      - Austin, TX
      - Remote
    workplace_types:
      - remote
      - hybrid
